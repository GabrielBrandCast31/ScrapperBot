services:
  waha:
    image: devlikeapro/waha:latest
    container_name: wpp_bot_waha
    platform: linux/amd64
    restart: always

    ports:
      # 127.0.0.1: so este Mac acessa (rede local nao alcanca)
      - '127.0.0.1:3000:3000'
    environment:
      - WHATSAPP_API_KEY=minha-chave-secreta
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=admin
      - WAHA_LOCAL_STORE_BASE_DIR=/app/data
      - WHATSAPP_FILES_FOLDER=/app/data/files
      # OBS: o auto-start da sessao no boot e feito pelo container `api`
      # (ver main.py / Waha.ensure_session_started), pois o WAHA Core nao
      # reinicia sessoes salvas sozinho.
    volumes:
      - ./waha_data:/app/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: wpp_bot_api
    restart: always
    ports:
      # Aberto na LAN: qualquer dispositivo na mesma rede acessa o painel
      # SEM autenticacao. Use com consciencia (conversas de clientes ficam expostas).
      - '5001:5000'
    volumes:
      - .:/app
      - ./chroma_data:/app/chroma_data
    
  
