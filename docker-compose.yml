services:
  waha:
    image: devlikeapro/waha:latest
    container_name: wpp_bot_waha
    platform: linux/amd64
    restart: always

    ports:
      # WAHA dashboard so para o proprio servidor (use SSH tunnel pra
      # acessar de fora). Porta de host 3030 pra nao colidir com outros
      # serviços rodando no mesmo host (frontend em 8080, backend em 8000, etc.).
      - '127.0.0.1:3030:3000'
    environment:
      - WHATSAPP_API_KEY=minha-chave-secreta
      - WAHA_DASHBOARD_USERNAME=admin
      - WAHA_DASHBOARD_PASSWORD=admin
      - WAHA_LOCAL_STORE_BASE_DIR=/app/data
      - WHATSAPP_FILES_FOLDER=/app/data/files
      # OBS: o auto-start da sessao no boot e feito pelo container `api`
      # (ver main.py / Waha.ensure_session_started), pois o WAHA Core nao
      # reinicia sessoes salvas sozinho.
    volumes:
      - ./waha_data:/app/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: wpp_bot_api
    restart: always
    ports:
      # Aberto na LAN: qualquer dispositivo na mesma rede acessa o painel
      # SEM autenticacao. Use com consciencia (conversas de clientes ficam expostas).
      # Porta de host 5050 pra nao colidir com outros serviços (5432 postgres, 5000 outros Flask).
      - '5050:5000'
    volumes:
      - .:/app
      - ./chroma_data:/app/chroma_data
    
  
