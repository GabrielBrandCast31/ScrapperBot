<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Painel BrandCast{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f6f8; }
    .sidebar {
      width: 240px; min-width: 240px;
      background: #1a1d23; color: #cfd3d8;
      min-height: 100vh; padding: 1.25rem 0;
    }
    .sidebar .brand {
      padding: 0 1.25rem 1rem; border-bottom: 1px solid #2a2e36;
      margin-bottom: .75rem;
    }
    .sidebar .brand h5 { color: #fff; margin: 0; font-weight: 700; }
    .sidebar .brand small { color: #6b7280; }
    .sidebar a.nav-item {
      display: flex; align-items: center; gap: .6rem;
      padding: .55rem 1.25rem; color: #cfd3d8; text-decoration: none;
      border-left: 3px solid transparent;
    }
    .sidebar a.nav-item:hover { background: #22262d; color: #fff; }
    .sidebar a.nav-item.active {
      background: #22262d; color: #fff;
      border-left-color: #0d6efd;
    }
    .sidebar .ico { font-size: 1.1rem; width: 1.4rem; text-align: center; }
    main.content { flex: 1; padding: 1.75rem 2rem; min-width: 0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="d-flex">

  <aside class="sidebar">
    <div class="brand">
      <h5>BrandCast</h5>
      <small>monitor de atendimento</small>
    </div>
    <nav class="d-flex flex-column">
      {% set a = active|default('') %}
      <a class="nav-item {{ 'active' if a == 'insights' else '' }}"  href="{{ url_for('dashboard.painel') }}"><span class="ico">📊</span> Insights</a>
      <a class="nav-item {{ 'active' if a == 'clientes' else '' }}" href="{{ url_for('dashboard.clientes') }}"><span class="ico">👥</span> Clientes</a>
      <a class="nav-item {{ 'active' if a == 'conversas' else '' }}" href="{{ url_for('dashboard.conversas') }}"><span class="ico">💬</span> Conversas</a>
      <a class="nav-item {{ 'active' if a == 'auditoria' else '' }}" href="{{ url_for('dashboard.auditoria') }}"><span class="ico">🔍</span> Auditoria IA</a>
      <a class="nav-item {{ 'active' if a == 'chat' else '' }}"     href="{{ url_for('dashboard.chat') }}"><span class="ico">🤖</span> Chat IA</a>
    </nav>
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
