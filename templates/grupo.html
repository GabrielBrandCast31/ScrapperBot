<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ nome }} — Mensagens</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

  <div class="mb-3">
    <a href="{{ url_for('dashboard.painel') }}" class="text-decoration-none">&larr; Voltar ao painel</a>
  </div>

  <h4 class="mb-3">{{ nome }}</h4>
  <p class="text-muted small">Últimas {{ mensagens|length }} mensagens (mais recentes primeiro)</p>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-sm table-hover align-middle mb-0">
        <thead class="table-light"><tr><th>Quando</th><th>Quem</th><th>Mensagem</th></tr></thead>
        <tbody>
          {% for m in mensagens %}
          <tr>
            <td class="text-nowrap small">{{ m.quando }}</td>
            <td class="text-nowrap">
              {% if m.from_me %}
                <span class="badge text-bg-secondary">Equipe</span>
              {% else %}
                <span class="badge text-bg-info">Cliente</span>
              {% endif %}
              <div class="small">{{ m.sender_name }}</div>
            </td>
            <td>{{ m.body }}</td>
          </tr>
          {% else %}
          <tr><td colspan="3" class="text-center text-muted py-4">Sem mensagens.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

</div>
</body>
</html>
